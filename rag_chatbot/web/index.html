<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HK Maintenance Portal</title>
    <style>
      :root {
        --bg: #f6f7f9;
        --panel: #ffffff;
        --line: #d8dde6;
        --text: #17202a;
        --muted: #657184;
        --accent: #0f766e;
        --accent-dark: #115e59;
        --warn: #9a3412;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background: var(--bg);
      }
      button, input, select, textarea { font: inherit; }
      button {
        border: 1px solid var(--line);
        background: #fff;
        color: var(--text);
        border-radius: 6px;
        cursor: pointer;
      }
      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }
      button.primary:hover { background: var(--accent-dark); }
      .app {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 360px minmax(0, 1fr);
      }
      .sidebar {
        border-right: 1px solid var(--line);
        background: #fff;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      .brand {
        padding: 18px;
        border-bottom: 1px solid var(--line);
      }
      .brand h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.2;
        letter-spacing: 0;
      }
      .brand p {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 13px;
      }
      .nav {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        padding: 12px;
        border-bottom: 1px solid var(--line);
      }
      .nav button {
        height: 36px;
        font-size: 13px;
      }
      .nav button.active {
        border-color: var(--accent);
        color: var(--accent-dark);
        background: #ecfdf5;
      }
      .doc-filter { padding: 12px; border-bottom: 1px solid var(--line); }
      .side-search {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 72px;
        gap: 8px;
      }
      .section-title {
        padding: 12px 10px 4px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }
      .doc-filter input, .searchbar input, .chatbox textarea, .toolbar select {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px 11px;
        background: #fff;
        color: var(--text);
      }
      .doc-list {
        overflow: auto;
        padding: 8px;
        min-height: 0;
      }
      .doc-item {
        width: 100%;
        text-align: left;
        display: block;
        padding: 10px;
        border: 1px solid transparent;
        background: transparent;
      }
      .doc-item:hover, .doc-item.selected {
        border-color: var(--line);
        background: #f8fafc;
      }
      .doc-item strong {
        display: block;
        font-size: 13px;
        line-height: 1.35;
        word-break: keep-all;
      }
      .doc-item span {
        display: block;
        margin-top: 5px;
        color: var(--muted);
        font-size: 12px;
        overflow-wrap: anywhere;
      }
      .main {
        min-width: 0;
        display: flex;
        flex-direction: column;
      }
      .topbar {
        height: 58px;
        border-bottom: 1px solid var(--line);
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 18px;
        gap: 12px;
      }
      .stats {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 13px;
      }
      .stats b { color: var(--text); }
      .topbar a {
        color: var(--accent-dark);
        text-decoration: none;
        font-weight: 600;
        font-size: 13px;
      }
      .content {
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }
      .workspace {
        height: 100%;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 380px;
        gap: 0;
      }
      .pane {
        min-width: 0;
        min-height: 0;
        overflow: auto;
        padding: 18px;
      }
      .pane + .pane { border-left: 1px solid var(--line); background: #fff; }
      .searchbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 96px;
        gap: 8px;
        margin-bottom: 14px;
      }
      .reader-empty {
        height: 100%;
        display: grid;
        place-items: center;
      }
      .workspace > .pane:first-child > .searchbar,
      .workspace > .pane:first-child > .answer,
      .workspace > .pane:first-child > .result,
      .workspace > .pane:first-child > .empty,
      .workspace > .pane:nth-child(2) > .doc-view {
        display: none;
      }
      .result, .answer, .doc-view, .chat-card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
      }
      .answer, .doc-view, .chat-card { padding: 16px; }
      .result {
        display: block;
        width: 100%;
        text-align: left;
        padding: 14px;
        margin-top: 10px;
      }
      .result h3, .doc-view h2 {
        margin: 0 0 8px;
        font-size: 16px;
        letter-spacing: 0;
      }
      .result p, .answer p {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.55;
      }
      .result small {
        display: block;
        margin-top: 8px;
        color: var(--accent-dark);
      }
      .markdown {
        overflow-wrap: anywhere;
        font-size: 14px;
        line-height: 1.7;
      }
      .markdown h1, .markdown h2, .markdown h3 {
        margin: 22px 0 10px;
        line-height: 1.25;
        letter-spacing: 0;
      }
      .markdown h1 { font-size: 26px; }
      .markdown h2 {
        font-size: 20px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--line);
      }
      .markdown h3 { font-size: 16px; }
      .markdown p { margin: 10px 0; }
      .markdown ul, .markdown ol {
        margin: 10px 0;
        padding-left: 24px;
      }
      .markdown li { margin: 5px 0; }
      .markdown blockquote {
        margin: 14px 0;
        padding: 10px 14px;
        border-left: 3px solid var(--accent);
        background: #f8fafc;
        color: #334155;
      }
      .markdown code {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
        font-size: 12px;
        background: #eef2f7;
        border: 1px solid #e2e8f0;
        border-radius: 4px;
        padding: 1px 5px;
      }
      .markdown pre {
        overflow: auto;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #0f172a;
        color: #e2e8f0;
      }
      .markdown pre code {
        border: 0;
        background: transparent;
        color: inherit;
        padding: 0;
      }
      .markdown table {
        width: 100%;
        border-collapse: collapse;
        margin: 14px 0;
        font-size: 13px;
      }
      .markdown th, .markdown td {
        border: 1px solid var(--line);
        padding: 8px 10px;
        vertical-align: top;
      }
      .markdown th {
        background: #f8fafc;
        text-align: left;
      }
      .markdown a {
        color: var(--accent-dark);
        text-decoration: none;
        border-bottom: 1px solid #99f6e4;
      }
      .doc-view {
        padding: 0;
        overflow: hidden;
      }
      .doc-header {
        padding: 18px 18px 14px;
        border-bottom: 1px solid var(--line);
        background: #fbfcfe;
      }
      .doc-body { padding: 18px; }
      .doc-view .path {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 8px;
        overflow-wrap: anywhere;
      }
      .doc-view h2 {
        margin: 0;
        font-size: 22px;
        line-height: 1.25;
      }
      .chatbox {
        display: grid;
        gap: 10px;
      }
      .toolbar {
        display: grid;
        grid-template-columns: 100px minmax(0, 1fr);
        gap: 8px;
      }
      .toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 13px;
      }
      .empty {
        color: var(--muted);
        padding: 28px;
        text-align: center;
      }
      .error { color: var(--warn); }
      @media (max-width: 980px) {
        .app { grid-template-columns: 1fr; }
        .sidebar { min-height: auto; max-height: 45vh; border-right: 0; border-bottom: 1px solid var(--line); }
        .workspace { grid-template-columns: 1fr; }
        .pane + .pane { border-left: 0; border-top: 1px solid var(--line); }
      }
      @media (max-width: 640px) {
        .topbar { height: auto; align-items: flex-start; padding: 12px; flex-direction: column; }
        .searchbar { grid-template-columns: 1fr; }
        .pane { padding: 12px; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script>
      const h = React.createElement;
      const api = (path, options) => fetch(path, options).then(async (res) => {
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || res.statusText);
        return data;
      });

      const escapeHtml = (value) => String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");

      const inlineMarkdown = (value) => {
        let text = escapeHtml(value);
        text = text.replace(/`([^`]+)`/g, "<code>$1</code>");
        text = text.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
        text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
        text = text.replace(/(^|[\s(])(https?:\/\/[^\s<]+)/g, '$1<a href="$2" target="_blank" rel="noreferrer">$2</a>');
        return text;
      };

      const renderMarkdown = (source) => {
        const lines = String(source || "").replace(/\r\n/g, "\n").split("\n");
        const html = [];
        let i = 0;

        const tableRow = (line, tag) => {
          const cells = line.trim().replace(/^\|/, "").replace(/\|$/, "").split("|");
          return "<tr>" + cells.map((cell) => `<${tag}>${inlineMarkdown(cell.trim())}</${tag}>`).join("") + "</tr>";
        };

        while (i < lines.length) {
          const line = lines[i];
          const trimmed = line.trim();

          if (!trimmed) {
            i += 1;
            continue;
          }

          if (trimmed.startsWith("```")) {
            const code = [];
            i += 1;
            while (i < lines.length && !lines[i].trim().startsWith("```")) {
              code.push(lines[i]);
              i += 1;
            }
            i += 1;
            html.push(`<pre><code>${escapeHtml(code.join("\n"))}</code></pre>`);
            continue;
          }

          const heading = trimmed.match(/^(#{1,3})\s+(.+)$/);
          if (heading) {
            const level = heading[1].length;
            html.push(`<h${level}>${inlineMarkdown(heading[2])}</h${level}>`);
            i += 1;
            continue;
          }

          if (/^---+$/.test(trimmed)) {
            html.push("<hr />");
            i += 1;
            continue;
          }

          if (trimmed.includes("|") && i + 1 < lines.length && /^\s*\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?\s*$/.test(lines[i + 1])) {
            html.push("<table><thead>" + tableRow(trimmed, "th") + "</thead><tbody>");
            i += 2;
            while (i < lines.length && lines[i].trim().includes("|")) {
              html.push(tableRow(lines[i], "td"));
              i += 1;
            }
            html.push("</tbody></table>");
            continue;
          }

          if (/^[-*]\s+/.test(trimmed)) {
            html.push("<ul>");
            while (i < lines.length && /^[-*]\s+/.test(lines[i].trim())) {
              html.push(`<li>${inlineMarkdown(lines[i].trim().replace(/^[-*]\s+/, ""))}</li>`);
              i += 1;
            }
            html.push("</ul>");
            continue;
          }

          if (/^\d+\.\s+/.test(trimmed)) {
            html.push("<ol>");
            while (i < lines.length && /^\d+\.\s+/.test(lines[i].trim())) {
              html.push(`<li>${inlineMarkdown(lines[i].trim().replace(/^\d+\.\s+/, ""))}</li>`);
              i += 1;
            }
            html.push("</ol>");
            continue;
          }

          if (trimmed.startsWith(">")) {
            const quote = [];
            while (i < lines.length && lines[i].trim().startsWith(">")) {
              quote.push(lines[i].trim().replace(/^>\s?/, ""));
              i += 1;
            }
            html.push(`<blockquote>${inlineMarkdown(quote.join(" "))}</blockquote>`);
            continue;
          }

          const paragraph = [trimmed];
          i += 1;
          while (
            i < lines.length &&
            lines[i].trim() &&
            !/^(#{1,3})\s+/.test(lines[i].trim()) &&
            !/^([-*]|\d+\.)\s+/.test(lines[i].trim()) &&
            !lines[i].trim().startsWith("```")
          ) {
            paragraph.push(lines[i].trim());
            i += 1;
          }
          html.push(`<p>${inlineMarkdown(paragraph.join(" "))}</p>`);
        }
        return html.join("");
      };

      function Markdown({ text, className = "markdown" }) {
        return h("div", { className, dangerouslySetInnerHTML: { __html: renderMarkdown(text) } });
      }

      function App() {
        const [meta, setMeta] = React.useState(null);
        const [docs, setDocs] = React.useState([]);
        const [filter, setFilter] = React.useState("");
        const [selected, setSelected] = React.useState(null);
        const [doc, setDoc] = React.useState(null);
        const [query, setQuery] = React.useState("");
        const [search, setSearch] = React.useState(null);
        const [chatQuery, setChatQuery] = React.useState("");
        const [chatAnswer, setChatAnswer] = React.useState("");
        const [topK, setTopK] = React.useState(5);
        const [useLlm, setUseLlm] = React.useState(false);
        const [loading, setLoading] = React.useState("");
        const [error, setError] = React.useState("");

        React.useEffect(() => {
          api("/api/meta").then(setMeta).catch((err) => setError(err.message));
          api("/api/docs").then((data) => setDocs(data.docs || [])).catch((err) => setError(err.message));
        }, []);

        const visibleDocs = React.useMemo(() => {
          const q = filter.trim().toLowerCase();
          if (!q) return docs.slice(0, 180);
          return docs.filter((item) =>
            [item.title, item.customer, item.source].join(" ").toLowerCase().includes(q)
          ).slice(0, 180);
        }, [docs, filter]);

        const openDoc = (source) => {
          setSelected(source);
          setLoading("doc");
          setError("");
          api("/api/doc?source=" + encodeURIComponent(source))
            .then(setDoc)
            .catch((err) => setError(err.message))
            .finally(() => setLoading(""));
        };

        const runSearch = (event) => {
          event && event.preventDefault();
          const term = (filter.trim() || query.trim());
          if (!term) return;
          setQuery(term);
          setLoading("search");
          setError("");
          api("/api/search?q=" + encodeURIComponent(term) + "&top_k=" + topK)
            .then(setSearch)
            .catch((err) => setError(err.message))
            .finally(() => setLoading(""));
        };

        const askChat = (event) => {
          event && event.preventDefault();
          if (!chatQuery.trim()) return;
          setLoading("chat");
          setError("");
          api("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query: chatQuery.trim(), topK, useLlm }),
          })
            .then((data) => setChatAnswer(data.answer || ""))
            .catch((err) => setError(err.message))
            .finally(() => setLoading(""));
        };

        return h("div", { className: "app" },
          h("aside", { className: "sidebar" },
            h("div", { className: "brand" },
              h("h1", null, "HK Maintenance Portal"),
              h("p", null, "RAG 검색, 유지보수 문서, 기존 챗을 한 화면에서 확인")
            ),
            h("div", { className: "nav" },
              h("button", { className: "active", onClick: () => window.scrollTo(0, 0) }, "문서/검색"),
              h("button", { onClick: () => location.href = "/chat/" }, "기존 챗")
            ),
            h("form", { className: "doc-filter side-search", onSubmit: runSearch },
              h("input", {
                value: filter,
                onChange: (event) => setFilter(event.target.value),
                placeholder: "고객사, 문서명, 경로 검색"
              }),
              h("button", { className: "primary", type: "submit" }, "검색")
            ),
            h("div", { className: "doc-list" },
              search && [
                h("div", { key: "result-title", className: "section-title" }, "검색 결과"),
                search.results.map((item) => h("button", {
                  key: "result-" + item.source + item.title,
                  className: "doc-item",
                  onClick: () => openDoc(item.source)
                }, h("strong", null, item.title), h("span", null, item.source + " / score " + item.score))),
                h("div", { key: "doc-title", className: "section-title" }, "문서 목록")
              ],
              visibleDocs.map((item) => h("button", {
                key: item.source,
                className: "doc-item " + (selected === item.source ? "selected" : ""),
                onClick: () => openDoc(item.source)
              }, h("strong", null, item.title), h("span", null, item.source))),
              visibleDocs.length === 0 && h("div", { className: "empty" }, "문서가 없습니다.")
            )
          ),
          h("main", { className: "main" },
            h("header", { className: "topbar" },
              h("div", { className: "stats" },
                h("span", null, "문서 ", h("b", null, meta ? meta.docCount : "-")),
                h("span", null, "검색 청크 ", h("b", null, meta ? meta.chunkCount : "-")),
                h("span", null, "LLM ", h("b", null, meta ? meta.llm : "-"))
              ),
              h("a", { href: "/chat/" }, "Gradio 챗 열기")
            ),
            h("section", { className: "content" },
              h("div", { className: "workspace" },
                h("div", { className: "pane" },
                  doc ? h("div", { className: "doc-view" }, [
                    h("div", { key: "head", className: "doc-header" },
                      h("div", { className: "path" }, doc.source),
                      h("h2", null, doc.title)
                    ),
                    h("div", { key: "content", className: "doc-body" }, h(Markdown, { text: doc.content }))
                  ]) : h("div", { className: "reader-empty" },
                    h("div", { className: "empty" }, search ? "왼쪽 검색 결과에서 자료를 선택하세요." : "왼쪽에서 자료를 검색하거나 문서를 선택하세요.")
                  ),
                  h("form", { className: "searchbar", onSubmit: runSearch },
                    h("input", {
                      value: query,
                      onChange: (event) => setQuery(event.target.value),
                      placeholder: "예: 대한항공 방문자 수 확인, 파크랜드 룩북, 보고서 발송"
                    }),
                    h("button", { className: "primary", type: "submit" }, loading === "search" ? "검색 중" : "검색")
                  ),
                  error && h("p", { className: "error" }, error),
                  search && h("div", { className: "answer" }, h(Markdown, { text: search.answer })),
                  search && search.results.map((item) => h("button", {
                    key: item.source + item.title,
                    className: "result",
                    onClick: () => openDoc(item.source)
                  }, h("h3", null, item.title), h("p", null, item.snippet), h("small", null, item.source + " / score " + item.score))),
                  !search && h("div", { className: "empty" }, "질문을 입력하면 관련 문서와 근거가 바로 표시됩니다.")
                ),
                h("div", { className: "pane" },
                  h("div", { className: "chat-card" },
                    h("form", { className: "chatbox", onSubmit: askChat },
                      h("textarea", {
                        rows: 4,
                        value: chatQuery,
                        onChange: (event) => setChatQuery(event.target.value),
                        placeholder: "문서 기반으로 바로 물어보기"
                      }),
                      h("div", { className: "toolbar" },
                        h("select", { value: topK, onChange: (event) => setTopK(Number(event.target.value)) },
                          [3, 5, 8, 10].map((n) => h("option", { key: n, value: n }, "근거 " + n))
                        ),
                        h("label", { className: "toggle" },
                          h("input", { type: "checkbox", checked: useLlm, onChange: (event) => setUseLlm(event.target.checked) }),
                          "LLM 답변 생성"
                        )
                      ),
                      h("button", { className: "primary", type: "submit" }, loading === "chat" ? "답변 중" : "질문하기")
                    ),
                    chatAnswer && h("div", { style: { marginTop: 14 } }, h(Markdown, { text: chatAnswer }))
                  ),
                  h("div", { className: "doc-view", style: { marginTop: 14 } },
                    doc ? [
                      h("div", { key: "head", className: "doc-header" },
                        h("div", { className: "path" }, doc.source),
                        h("h2", null, doc.title)
                      ),
                      h("div", { key: "content", className: "doc-body" }, h(Markdown, { text: doc.content }))
                    ] : h("div", { className: "empty" }, loading === "doc" ? "문서 여는 중" : "왼쪽에서 문서를 선택하세요.")
                  )
                )
              )
            )
          )
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(h(App));
    </script>
  </body>
</html>
