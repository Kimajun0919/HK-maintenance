services:
  - type: web
    name: hk-maintenance-rag
    runtime: docker
    plan: free
    region: singapore
    envVars:
      - key: DOC_STORAGE
        value: supabase
      - key: SUPABASE_SEED_FROM_FILES
        value: "0"
      - key: APP_PORT
        value: "8080"
      - key: APP_HOST
        value: "0.0.0.0"
      - key: USE_LLM
        value: "0"
      - key: EMBEDDING_BACKEND
        value: none
      - key: SUPABASE_DB_URL
        sync: false
