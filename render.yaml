services:
  # Render free-tier services use the low-memory database-backed search profile.
  # On a larger Render plan, override these service env vars to enable startup indexing:
  # RAG_STARTUP_INDEX=1
  # RAG_ENABLE_NGRAM_INDEX=1
  # RAG_ENABLE_LEGACY_INDEX=1
  - type: web
    name: hk-maintenance-rag
    runtime: docker
    plan: free
    region: singapore
    envVars:
      - key: DOC_STORAGE
        value: supabase
      - key: SUPABASE_PROFILE
        value: main
      - key: SUPABASE_PROFILE_STRICT
        value: "1"
      - key: SUPABASE_SEED_FROM_FILES
        value: "0"
      - key: SUPABASE_AUTO_MIGRATE
        value: "0"
      - key: APP_PORT
        value: "8080"
      - key: APP_HOST
        value: "0.0.0.0"
      - key: USE_LLM
        value: "0"
      - key: EMBEDDING_BACKEND
        value: none
      - key: RAG_STARTUP_INDEX
        value: "0"
      - key: RAG_ENABLE_NGRAM_INDEX
        value: "0"
      - key: RAG_ENABLE_LEGACY_INDEX
        value: "0"
      - key: SUPABASE_DB_URL_MAIN
        sync: false

  - type: web
    name: hk-maintenance-rag-fresh
    runtime: docker
    plan: free
    region: singapore
    envVars:
      - key: DOC_STORAGE
        value: supabase
      - key: SUPABASE_PROFILE
        value: fresh
      - key: SUPABASE_PROFILE_STRICT
        value: "1"
      - key: SUPABASE_SEED_FROM_FILES
        value: "0"
      - key: SUPABASE_AUTO_MIGRATE
        value: "0"
      - key: APP_PORT
        value: "8080"
      - key: APP_HOST
        value: "0.0.0.0"
      - key: USE_LLM
        value: "0"
      - key: EMBEDDING_BACKEND
        value: none
      - key: RAG_STARTUP_INDEX
        value: "0"
      - key: RAG_ENABLE_NGRAM_INDEX
        value: "0"
      - key: RAG_ENABLE_LEGACY_INDEX
        value: "0"
      - key: SUPABASE_DB_URL_FRESH
        sync: false
