name: Package Apps

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version"
        required: false
        default: "manual"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  local-bundle:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package local bundle
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if (-not $version) { $version = "${{ github.ref_name }}" }
          ./scripts/package-local.ps1 -Version $version
      - uses: actions/upload-artifact@v4
        with:
          name: local-bundle
          path: dist/*.zip

  windows-app:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Build Windows app
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if (-not $version) { $version = "${{ github.ref_name }}" }
          ./scripts/build-windows-app.ps1 -Version $version
      - uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: dist/*.zip

  android-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"
      - name: Build Android APK
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ]; then version="${{ github.ref_name }}"; fi
          bash scripts/build-android-apk.sh "$version"
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: dist/*.apk

  macos-launcher:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build macOS launcher
        run: |
          version="${{ github.event.inputs.version }}"
          if [ -z "$version" ]; then version="${{ github.ref_name }}"; fi
          bash scripts/build-macos-launcher.sh "$version"
      - uses: actions/upload-artifact@v4
        with:
          name: macos-launcher
          path: dist/*.zip

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [local-bundle, windows-app, android-app, macos-launcher]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist-artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist-artifacts/*
